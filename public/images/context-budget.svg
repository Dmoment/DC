  <rect x="400" y="105" width="170" height="55" rx="8" fill="#D1FAE5" stroke="#16a34a" stroke-width="1"/>
  <text x="485" y="130" text-anchor="middle" font-size="20" font-weight="700" fill="#2D2D2D">~120</text>
  <text x="485" y="148" text-anchor="middle" font-size="10" fill="#888">more skills possible</text>

  <text x="300" y="186" text-anchor="middle" font-size="10" fill="#888">10 commands/skills at 7% — plenty of room to grow</text>
