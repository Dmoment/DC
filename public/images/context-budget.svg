<svg viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, sans-serif;">
  <rect width="600" height="200" fill="#FAFAF9" rx="8"/>
  <text x="300" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#2D2D2D">Skill Context Budget</text>

  <!-- Progress bar -->
  <rect x="30" y="48" width="540" height="36" rx="8" fill="#E5E7EB"/>
  <rect x="30" y="48" width="38" height="36" rx="8" fill="#D97757"/>
  <text x="50" y="71" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">7%</text>
  <text x="310" y="71" text-anchor="middle" font-size="12" fill="#888">93% available</text>

  <!-- Stats -->
  <rect x="30" y="105" width="170" height="55" rx="8" fill="#FFF1E6" stroke="#D97757" stroke-width="1"/>
  <text x="115" y="130" text-anchor="middle" font-size="20" font-weight="700" fill="#2D2D2D">1,233</text>
  <text x="115" y="148" text-anchor="middle" font-size="10" fill="#888">characters used</text>

  <rect x="215" y="105" width="170" height="55" rx="8" fill="#fff" stroke="#d4d4d4" stroke-width="1"/>
