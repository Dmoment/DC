<svg viewBox="0 0 700 220" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, sans-serif;">
  <rect width="700" height="220" fill="#FAFAF9" rx="8"/>

  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a1a1aa"/>
    </marker>
  </defs>

  <text x="350" y="24" text-anchor="middle" font-size="14" font-weight="600" fill="#2D2D2D">How each type gets triggered</text>

  <!-- Commands row -->
  <rect x="20" y="42" width="80" height="28" rx="6" fill="#DBEAFE" stroke="#93c5fd" stroke-width="1"/>
  <text x="60" y="60" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Commands</text>
  <rect x="140" y="42" width="130" height="28" rx="6" fill="#fff" stroke="#d4d4d4" stroke-width="1"/>
  <text x="205" y="60" text-anchor="middle" font-size="11" fill="#555">You type /deploy</text>
  <line x1="270" y1="56" x2="380" y2="56" stroke="#a1a1aa" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="390" y="42" width="130" height="28" rx="6" fill="#D1FAE5" stroke="#16a34a" stroke-width="1"/>
  <text x="455" y="60" text-anchor="middle" font-size="11" font-weight="500" fill="#065f46">Command runs</text>
  <text x="570" y="60" font-size="10" fill="#888">manual trigger</text>

  <!-- Rules row -->
  <rect x="20" y="100" width="80" height="28" rx="6" fill="#FEF3C7" stroke="#fbbf24" stroke-width="1"/>
  <text x="60" y="118" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Rules</text>
  <rect x="140" y="100" width="130" height="28" rx="6" fill="#fff" stroke="#d4d4d4" stroke-width="1"/>
  <text x="205" y="118" text-anchor="middle" font-size="11" fill="#555">You edit *.rb file</text>
  <line x1="270" y1="114" x2="380" y2="114" stroke="#a1a1aa" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="390" y="100" width="130" height="28" rx="6" fill="#D1FAE5" stroke="#16a34a" stroke-width="1"/>
  <text x="455" y="118" text-anchor="middle" font-size="11" font-weight="500" fill="#065f46">Rules auto-apply</text>
  <text x="570" y="118" font-size="10" fill="#888">glob pattern match</text>

  <!-- Skills row -->
  <rect x="20" y="158" width="80" height="28" rx="6" fill="#FFF1E6" stroke="#D97757" stroke-width="1"/>
  <text x="60" y="176" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412">Skills</text>
  <rect x="140" y="158" width="130" height="28" rx="6" fill="#fff" stroke="#d4d4d4" stroke-width="1"/>
  <text x="205" y="176" text-anchor="middle" font-size="11" fill="#555">You write code</text>
  <line x1="270" y1="172" x2="380" y2="172" stroke="#a1a1aa" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="390" y="158" width="140" height="28" rx="6" fill="#D1FAE5" stroke="#16a34a" stroke-width="1"/>
  <text x="460" y="176" text-anchor="middle" font-size="11" font-weight="500" fill="#065f46">Claude invokes skill</text>
  <text x="575" y="176" font-size="10" fill="#888">AI decides when</text>
</svg>