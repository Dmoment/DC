<svg viewBox="0 0 800 180" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, sans-serif;">
  <rect width="800" height="180" fill="#FAFAF9" rx="8"/>

  <!-- Timeline line -->
  <line x1="40" y1="90" x2="760" y2="90" stroke="#d4d4d4" stroke-width="2"/>

  <!-- Step 1 -->
  <circle cx="100" cy="90" r="6" fill="#93c5fd"/>
  <rect x="55" y="30" width="90" height="40" rx="6" fill="#DBEAFE" stroke="#93c5fd" stroke-width="1"/>
  <text x="100" y="48" text-anchor="middle" font-size="10" fill="#1e40af">Descriptions</text>
  <text x="100" y="60" text-anchor="middle" font-size="10" fill="#1e40af">loaded</text>
  <text x="100" y="120" text-anchor="middle" font-size="9" fill="#888">lean context</text>

  <!-- Step 2 -->
  <circle cx="270" cy="90" r="6" fill="#a1a1aa"/>
  <rect x="220" y="30" width="100" height="40" rx="6" fill="#fff" stroke="#d4d4d4" stroke-width="1"/>
  <text x="270" y="48" text-anchor="middle" font-size="10" fill="#555">You send</text>
  <text x="270" y="60" text-anchor="middle" font-size="10" fill="#555">a message</text>

  <!-- Step 3 -->
  <circle cx="440" cy="90" r="6" fill="#3b82f6"/>
  <rect x="385" y="30" width="110" height="40" rx="6" fill="#DBEAFE" stroke="#3b82f6" stroke-width="1"/>
  <text x="440" y="48" text-anchor="middle" font-size="10" fill="#1e40af">Claude matches</text>
  <text x="440" y="60" text-anchor="middle" font-size="10" fill="#1e40af">skill description</text>
  <text x="440" y="120" text-anchor="middle" font-size="9" fill="#888">AI decision</text>

  <!-- Step 4 -->
  <circle cx="590" cy="90" r="8" fill="#10b981"/>
  <rect x="535" y="26" width="110" height="48" rx="6" fill="#D1FAE5" stroke="#10b981" stroke-width="1.5"/>
  <text x="590" y="46" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">Full content</text>
  <text x="590" y="60" text-anchor="middle" font-size="10" fill="#065f46">EXPANDS</text>

  <!-- Step 5 -->
  <circle cx="720" cy="90" r="8" fill="#D97757"/>
  <rect x="670" y="26" width="100" height="48" rx="6" fill="#FFF1E6" stroke="#D97757" stroke-width="1.5"/>
  <text x="720" y="46" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412">SKILL</text>
  <text x="720" y="60" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412">RUNS</text>

  <!-- Arrows -->
  <path d="M 110 90 L 260 90" stroke="#d4d4d4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 280 90 L 430 90" stroke="#d4d4d4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 450 90 L 580 90" stroke="#d4d4d4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 600 90 L 710 90" stroke="#d4d4d4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a1a1aa"/>
    </marker>
  </defs>

  <!-- Bottom caption -->
  <text x="400" y="160" text-anchor="middle" font-size="10" fill="#888">"The skill is loading..." -- prompt expands with detailed instructions</text>
</svg>